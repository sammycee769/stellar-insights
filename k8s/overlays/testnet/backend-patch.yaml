apiVersion: apps/v1
kind: Deployment
metadata:
  name: stellar-insights-backend
  namespace: stellar-insights-testnet
spec:
  replicas: 1
  template:
    spec:
      containers:
      - name: backend
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
